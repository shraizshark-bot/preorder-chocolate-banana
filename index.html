<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黑金巧克力香蕉｜限量預購</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Serif+TC:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8CB7A;
    --dark: #1A1209;
    --cream: #FAF3E0;
    --border: #C9A84C55;
  }

  body {
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif TC', serif;
    padding: 24px;
  }

  .card {
    background: linear-gradient(145deg, #211508 0%, #1A1209 60%, #261A08 100%);
    border: 1px solid var(--border);
    border-radius: 4px;
    max-width: 480px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 8px 60px #00000088, inset 0 1px 0 #C9A84C33;
    position: relative;
  }

  .hero {
    display: block;
    width: 100%;
    height: auto;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
  }

  .header {
    padding: 36px 36px 24px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 3px 12px;
    margin-bottom: 16px;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--gold-light);
    line-height: 1.2;
  }

  .subtitle {
    font-size: 13px;
    color: #a08040;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  .info-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 20px 36px;
    border-bottom: 1px solid var(--border);
  }

  .info-item { text-align: center; }

  .info-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #7a6030;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .info-value {
    font-size: 15px;
    color: var(--cream);
    font-weight: 600;
  }

  .price-highlight {
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-size: 20px;
  }

  .notice {
    margin: 20px 36px 0;
    padding: 12px 16px;
    background: #C9A84C11;
    border-left: 2px solid var(--gold);
    font-size: 12px;
    color: #b09050;
    letter-spacing: 0.03em;
  }

  .pay-options {
    display: flex;
    gap: 8px;
  }

  .pay-option {
    flex: 1;
    position: relative;
  }

  .pay-option input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .pay-option label {
    display: block;
    text-align: center;
    padding: 10px;
    border: 1px solid #3D2F0F;
    background: #0D0B06;
    color: #7a6030;
    border-radius: 2px;
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 0.1em;
    transition: all 0.15s;
    text-transform: none;
  }

  .pay-option input:checked + label {
    border-color: var(--gold);
    color: var(--gold);
    background: #C9A84C11;
  }

  .bank-info {
    margin-top: 4px;
    padding: 14px 16px;
    background: #0D0B06;
    border: 1px solid #3D2F0F;
    border-radius: 2px;
    font-size: 12px;
    color: #b09050;
    line-height: 1.8;
    display: none;
  }

  .bank-info.show { display: block; }

  .bank-info .row { display: flex; justify-content: space-between; }
  .bank-info .key { color: #7a6030; letter-spacing: 0.1em; }
  .bank-info .val { color: var(--cream); font-family: 'Playfair Display', serif; }
  .bank-info .placeholder { color: #50400A; font-style: italic; }

  .form {
    padding: 24px 36px 36px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
  }

  label .req { color: var(--gold); margin-left: 3px; }

  input, select, textarea {
    background: #0D0B06;
    border: 1px solid #3D2F0F;
    border-radius: 2px;
    color: var(--cream);
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--gold); }
  input::placeholder, textarea::placeholder { color: #50400A; }

  .qty-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .qty-btn {
    width: 36px; height: 36px;
    border: 1px solid #3D2F0F;
    background: #0D0B06;
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .qty-btn:hover { border-color: var(--gold); }

  .qty-display {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--cream);
    min-width: 32px;
    text-align: center;
  }

  .qty-label { font-size: 12px; color: #7a6030; }

  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .total-label {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: #7a6030;
    text-transform: uppercase;
  }

  .total-amount {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--gold-light);
  }

  .submit-btn {
    background: linear-gradient(135deg, #A07828, #C9A84C, #A07828);
    border: none;
    border-radius: 2px;
    color: var(--dark);
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 14px;
    cursor: pointer;
    transition: all 0.3s;
    width: 100%;
    margin-top: 4px;
    position: relative;
  }

  .submit-btn:hover { box-shadow: 0 4px 20px #C9A84C44; }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--dark);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    font-size: 12px;
    color: #e08040;
    padding: 10px 14px;
    background: #e0804011;
    border-left: 2px solid #e08040;
    display: none;
  }

  .success {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 48px 36px;
    text-align: center;
    gap: 12px;
  }

  .success-icon { font-size: 40px; margin-bottom: 8px; }

  .success-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--gold-light);
  }

  .success-text {
    font-size: 13px;
    color: #a08040;
    line-height: 1.9;
  }
</style>
</head>
<body>
<div class="card">
  <img src="hero.jpg" alt="黑金巧克力香蕉" class="hero">

  <div class="info-row">
    <div class="info-item">
      <div class="info-label">規格</div>
      <div class="info-value">一盒兩份</div>
    </div>
    <div class="info-item">
      <div class="info-label">適合人數</div>
      <div class="info-value">4 人</div>
    </div>
    <div class="info-item">
      <div class="info-label">售價</div>
      <div class="info-value price-highlight">$580</div>
    </div>
  </div>

  <div class="notice">⚠ 限量手工製作・不定期出貨，售完為止。預訂後將以電話聯繫付款／取貨細節。</div>

  <div class="form" id="orderForm">
    <div class="field">
      <label>姓名 <span class="req">*</span></label>
      <input type="text" id="name" placeholder="請輸入姓名" required>
    </div>
    <div class="field">
      <label>聯絡電話 <span class="req">*</span></label>
      <input type="tel" id="phone" placeholder="09xx-xxx-xxx" maxlength="12" inputmode="numeric" required>
    </div>
    <div class="field">
      <label>訂購數量</label>
      <div class="qty-row">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <div class="qty-display" id="qty_display">1</div>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
        <div class="qty-label">盒（每盒 $580）</div>
      </div>
    </div>
    <div class="field">
      <label>付款方式 <span class="req">*</span></label>
      <div class="pay-options">
        <div class="pay-option">
          <input type="radio" id="pay_cash" name="payment" value="現金" checked>
          <label for="pay_cash">現金</label>
        </div>
        <div class="pay-option">
          <input type="radio" id="pay_transfer" name="payment" value="匯款">
          <label for="pay_transfer">匯款</label>
        </div>
      </div>
      <div class="bank-info" id="bankInfo">
        <div class="row"><span class="key">銀行</span><span class="val placeholder">即將提供</span></div>
        <div class="row"><span class="key">帳號</span><span class="val placeholder">即將提供</span></div>
        <div class="row"><span class="key">戶名</span><span class="val placeholder">即將提供</span></div>
        <div style="margin-top:8px;font-size:11px;color:#7a6030;">送出後將顯示完整資訊及匯款回報連結</div>
      </div>
    </div>
    <div class="field">
      <label>備註</label>
      <textarea id="note" rows="2" placeholder="任何特殊需求…"></textarea>
    </div>
    <div class="total-row">
      <div class="total-label">總金額</div>
      <div class="total-amount" id="total">$580</div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="submit-btn" id="submitBtn" onclick="submitOrder()">確認預購</button>
  </div>

  <div class="success" id="successMsg">
    <div class="success-icon">✦</div>
    <div class="success-title">預購成功</div>
    <div class="success-text" id="successDetail"></div>
  </div>
</div>

<script>
  // ============================================================
  // 🔧 填入你的 Apps Script Web App URL
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzpy2ykv16K06T7ZJx79rQaVAsHuTBC8tBC7bbHs8eChMVkzHTJMxfYJdBqi9-FoZ73Kw/exec';
  // ============================================================

  let qty = 1;
  const price = 580;

  function changeQty(delta) {
    qty = Math.max(1, qty + delta);
    document.getElementById('qty_display').textContent = qty;
    document.getElementById('total').textContent = '$' + (qty * price).toLocaleString();
  }

  async function submitOrder() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const note = document.getElementById('note').value.trim();
    const payment = document.querySelector('input[name="payment"]:checked').value;
    const errorEl = document.getElementById('errorMsg');
    const btn = document.getElementById('submitBtn');

    errorEl.style.display = 'none';

    if (!name || !phone) {
      errorEl.textContent = '請填寫姓名及聯絡電話';
      errorEl.style.display = 'block';
      return;
    }

    if (!/^09\d{2}-\d{3}-\d{3}$/.test(phone)) {
      errorEl.textContent = '電話格式錯誤，請輸入 09xx-xxx-xxx';
      errorEl.style.display = 'block';
      return;
    }

    const total = qty * price;

    // 送出中狀態
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>送出中…';

    try {
      await fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'order', name, phone, qty, total, payment, note })
      });

      // no-cors 無法讀取 response，視為成功
      showSuccess(name, phone, total, payment, note);

    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = '確認預購';
      errorEl.textContent = '送出失敗，請稍後再試或聯繫主辦方';
      errorEl.style.display = 'block';
    }
  }

  function showSuccess(name, phone, total, payment, note) {
    document.getElementById('orderForm').style.display = 'none';
    const s = document.getElementById('successMsg');
    s.style.display = 'flex';

    let payBlock;
    if (payment === '匯款') {
      const reportUrl = `report.html?phone=${encodeURIComponent(phone)}`;
      payBlock =
        `<div style="margin-top:16px;padding:14px;background:#0D0B06;border:1px solid var(--border);text-align:left;font-size:13px;line-height:1.9;">` +
        `<div style="color:var(--gold);letter-spacing:0.1em;margin-bottom:8px;">匯款資訊</div>` +
        `<div style="color:#7a6030;">銀行　<span style="color:#50400A;font-style:italic;">即將提供</span></div>` +
        `<div style="color:#7a6030;">帳號　<span style="color:#50400A;font-style:italic;">即將提供</span></div>` +
        `<div style="color:#7a6030;">戶名　<span style="color:#50400A;font-style:italic;">即將提供</span></div>` +
        `<div style="margin-top:10px;font-size:11px;color:#7a6030;">完整帳號將以電話／訊息提供</div>` +
        `</div>` +
        `<a href="${reportUrl}" class="submit-btn" style="display:inline-block;text-decoration:none;margin-top:14px;text-align:center;">匯款後回報末5碼 →</a>`;
    } else {
      payBlock = `<div style="margin-top:14px;font-size:13px;color:#a08040;">💵 取貨時請準備現金 $${total.toLocaleString()}</div>`;
    }

    document.getElementById('successDetail').innerHTML =
      `${name} 您好，已收到您的預購申請<br><br>` +
      `🍫 黑金巧克力香蕉 × ${qty} 盒<br>` +
      `💰 應付金額：$${total.toLocaleString()}<br>` +
      `💳 付款方式：${payment}<br>` +
      (note ? `📝 備註：${note}<br>` : '') +
      `<br>限量手工製作，將於備貨完成後以電話聯繫取貨` +
      payBlock;
  }

  // 切換付款方式：顯示／隱藏銀行區塊
  document.querySelectorAll('input[name="payment"]').forEach(r => {
    r.addEventListener('change', () => {
      document.getElementById('bankInfo').classList.toggle('show', r.value === '匯款' && r.checked);
    });
  });

  document.getElementById('phone').addEventListener('input', (e) => {
    const digits = e.target.value.replace(/\D/g, '').slice(0, 10);
    let formatted = digits;
    if (digits.length > 7) {
      formatted = `${digits.slice(0, 4)}-${digits.slice(4, 7)}-${digits.slice(7)}`;
    } else if (digits.length > 4) {
      formatted = `${digits.slice(0, 4)}-${digits.slice(4)}`;
    }
    e.target.value = formatted;
  });
</script>
</body>
</html>
